# pixi global manifest -- THE tool list (like the old flake's `paths`).
#
# This is the source of truth. sync.sh symlinks it to ~/.pixi/manifests/ and
# applies it with `pixi global sync`. To add a tool: add it under
# [envs.dotfiles.dependencies] AND add its binary under [envs.dotfiles.exposed],
# then run ./sync.sh.
#
# Only `pixi global sync` / `update` are safe here -- do NOT run
# `pixi global install`, it rewrites this file in an unreadable machine format.
#
# Path deps are relative to this file (the repo root), so `ext/<name>` points at
# the repo's ext/ dir. (pixi follows the symlink to this real location.)
version = 1

# Build tool for the from-source backends (kept in its own env).
[envs.rattler-build]
channels = ["conda-forge"]
dependencies = { rattler-build = "*" }
exposed = { rattler-build = "rattler-build" }


[envs.dotfiles]
channels = ["conda-forge"]
shortcuts = ["kitty", "tev"]

[envs.dotfiles.dependencies]
# Editors / terminals / from-source builds (ext/<name>)
nvim = { path = "ext/neovim" }      # nightly
vim = "*"
kitty = { path = "ext/kitty" }      # latest (conda-forge's is ancient)
tev = { path = "ext/tev" }
sshr = { path = "ext/sshr" }        # your repo
stow = { path = "ext/stow" }
passage = { path = "ext/passage" }
gemini-cli = { path = "ext/gemini-cli" }    # npm (custom backend)
claude-code = { path = "ext/claude-code" }  # npm (custom backend)

# Development tools
ripgrep = "*"
fd-find = "*"
tree = "*"
tree-sitter-cli = "*"
curl = "*"
wget = "*"
uv = "*"
rust = "*"
nodejs = "*"
python = "*"
git = "*"
git-lfs = "*"
gh = "*"
lazygit = "*"

# Shell & CLI
fish = "*"
starship = "*"
direnv = "*"
atuin = "*"
zoxide = "*"
zellij = "*"
fzf = "*"
eza = "*"
bat = "*"
dust = "*"
btop = "*"
duf = "*"
mosh = "*"
claude-agent-acp = "*"

# Utilities / secrets / typesetting
unzip = "*"
zip = "*"
gzip = "*"
which = "*"
file = "*"
less = "*"
age = "*"
typst = "*"

# Binaries surfaced onto PATH (~/.pixi/bin). One line per binary you want global;
# unlisted binaries (git-receive-pack, pydoc, etc.) stay inside the env.
[envs.dotfiles.exposed]
nvim = "nvim"
vim = "vim"
kitty = "kitty"
kitten = "kitten"
tev = "tev"
sshr = "sshr"
stow = "stow"
passage = "passage"
gemini = "gemini"
claude = "claude"
rg = "rg"
fd = "fd"
tree = "tree"
tree-sitter = "tree-sitter"
