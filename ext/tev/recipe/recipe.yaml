# tev -- HDR image viewer (Tom94/tev). Installed from the project's OFFICIAL
# prebuilt binaries (Linux AppImage, macOS .dmg) instead of building from source.
# This avoids the whole Linux GUI build stack (GL/X11/nanogui's hardcoded link
# list) -- the binaries are self-contained and use the system's GL/X11 at runtime.
#
# To bump: change `version`, ext/tev/pixi.toml, and the four sha256 below.

context:
  version: "2.12.2"

package:
  name: tev
  version: ${{ version }}

source:
  # Linux: self-extracting AppImage (kept as a file; build.sh --appimage-extract).
  - if: target_platform == "linux-64"
    then:
      - url: https://github.com/Tom94/tev/releases/download/v${{ version }}/tev.appimage
        sha256: dfecc8900bd8b012e4efd4612791a9eff1d175f6c1b35c75f57a2f232c47a0a7
        file_name: tev.appimage
  - if: target_platform == "linux-aarch64"
    then:
      - url: https://github.com/Tom94/tev/releases/download/v${{ version }}/tev-arm.appimage
        sha256: 8ecc9b1f9003202f33c437fcaa7e5d01544ad8c85d938781df924ae09b52721d
        file_name: tev.appimage
  # macOS: .dmg per arch (contains tev.app); build.sh mounts it with hdiutil.
  - if: target_platform == "osx-arm64"
    then:
      - url: https://github.com/Tom94/tev/releases/download/v${{ version }}/tev.dmg
        sha256: acab07c8997f3356cd11f715c8d55be73020d98e813a794ead82121e89e9de8d
        file_name: tev.dmg
  - if: target_platform == "osx-64"
    then:
      - url: https://github.com/Tom94/tev/releases/download/v${{ version }}/tev-intel.dmg
        sha256: 0482eb9e348d6a03c836389dfc48fb81ad99a84842909130bf09cc52020b566a
        file_name: tev.dmg

build:
  number: 0
  # Prebuilt, self-contained binaries: don't let rattler-build patchelf/relocate
  # them (it would rewrite the AppImage's bundled rpaths and needs patchelf).
  dynamic_linking:
    binary_relocation: false

tests:
  - script:
      - tev --help

about:
  homepage: https://github.com/Tom94/tev
  license: GPL-3.0-or-later
  summary: A high dynamic range (HDR) image viewer
  repository: https://github.com/Tom94/tev
