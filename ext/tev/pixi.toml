# pixi package for tev (https://github.com/Tom94/tev), an HDR image viewer. Not
# on conda-forge. We install the project's OFFICIAL prebuilt binaries (Linux
# AppImage, macOS .dmg) rather than building from source -- see recipe/recipe.yaml.

[package]
name = "tev"
version = "2.12.2"

[package.build.backend]
name = "pixi-build-rattler-build"
version = "*"
channels = ["https://prefix.dev/conda-forge"]
