# GNU stow -- symlink farm manager (pure Perl, autotools build).
context:
  version: "2.4.1"

package:
  name: stow
  version: ${{ version }}

source:
  url: https://ftp.gnu.org/gnu/stow/stow-${{ version }}.tar.gz
  sha256: 2a671e75fc207303bfe86a9a7223169c7669df0a8108ebdf1a7fe8cd2b88780b

build:
  number: 0

requirements:
  build:
    - make
    - texinfo      # `make` rebuilds the manual; needs makeinfo
  host:
    - perl
  run:
    - perl

tests:
  - script:
      - stow --version

about:
  homepage: https://www.gnu.org/software/stow/
  license: GPL-3.0-or-later
  license_file: COPYING
  summary: GNU Stow -- a symlink farm manager for dotfiles
