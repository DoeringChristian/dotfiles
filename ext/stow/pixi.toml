# Buildable pixi package for GNU stow. conda-forge only ships it for linux-64,
# so we build it from source (pure Perl, autotools) to also cover osx-arm64.

[package]
name = "stow"
version = "2.4.1"

[package.build.backend]
name = "pixi-build-rattler-build"
version = "*"
channels = ["https://prefix.dev/conda-forge"]
