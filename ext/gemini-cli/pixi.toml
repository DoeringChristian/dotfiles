# gemini-cli, now built via our custom pixi-build-npm backend (ext/pixi-build-npm).
# No recipe needed -- the backend generates one from the config below and runs
# `npm install`. This is the payoff of the backend: declaring an npm tool is now
# just a name + version + the npm package id.
#
# Requires the backend override to be active, e.g.:
#   PIXI_BUILD_BACKEND_OVERRIDE=pixi-build-npm=$PWD/ext/pixi-build-npm/pixi-build-npm
# (wired into .envrc so it's always set in this workspace).

[package]
name = "gemini-cli"
version = "0.47.0"

[package.build.backend]
name = "pixi-build-npm"
version = "*"
channels = ["https://prefix.dev/conda-forge"]

[package.build.config]
npm-package = "@google/gemini-cli"
node = ">=20"
