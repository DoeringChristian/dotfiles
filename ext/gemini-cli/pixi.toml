# gemini-cli, vendored from npm via a thin rattler-build recipe (recipe/build.sh
# runs `npm install`). Uses the standard pixi-build-rattler-build backend so it
# builds under `pixi global sync` with no backend override needed.

[package]
name = "gemini-cli"
version = "0.47.0"

[package.build.backend]
name = "pixi-build-rattler-build"
version = "*"
channels = ["https://prefix.dev/conda-forge"]
