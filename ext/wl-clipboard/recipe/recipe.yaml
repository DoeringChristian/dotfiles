# wl-clipboard -- wl-copy / wl-paste for Wayland (meson build). Linux-only.
context:
  version: "2.3.0"

package:
  name: wl-clipboard
  version: ${{ version }}

source:
  url: https://github.com/bugaevc/wl-clipboard/archive/refs/tags/v${{ version }}.tar.gz
  sha256: b4dc560973f0cd74e02f817ffa2fd44ba645a4f1ea94b7b9614dacc9f895f402

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - meson
    - ninja
    - pkg-config
  host:
    - wayland               # also provides wayland-scanner
    - wayland-protocols

tests:
  - script:
      - wl-copy --version

about:
  homepage: https://github.com/bugaevc/wl-clipboard
  license: GPL-3.0-or-later
  summary: Command-line copy/paste utilities for Wayland
