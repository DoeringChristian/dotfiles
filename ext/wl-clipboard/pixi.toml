# Buildable pixi package for wl-clipboard (Wayland copy/paste). Linux-only;
# not on conda-forge. Built from source with meson.
# NOTE: only referenced from [target.linux-64.dependencies], so it builds on
# Linux only -- it has NOT been built/verified on macOS.

[package]
name = "wl-clipboard"
version = "2.3.0"

[package.build.backend]
name = "pixi-build-rattler-build"
version = "*"
channels = ["https://prefix.dev/conda-forge"]
