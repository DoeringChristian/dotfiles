# Buildable pixi package for passage (https://github.com/FiloSottile/passage),
# a fork of password-store that uses age instead of gpg. Not on conda-forge.
# It's a bash script -- "building" just runs `make install`.

[package]
name = "passage"
version = "1.7.4a2"

[package.build.backend]
name = "pixi-build-rattler-build"
version = "*"
channels = ["https://prefix.dev/conda-forge"]
