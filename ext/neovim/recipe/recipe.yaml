# rattler-build recipe for Neovim NIGHTLY, built from upstream git.
#
# `nightly` is a moving tag that upstream recuts from master daily -- the same
# thing the nix neovim-nightly-overlay tracks. Because the tag moves, the conda
# `version` below is just a static dev marker for package metadata; the real
# version baked into the binary comes from `git describe` at build time
# (e.g. v0.13.0-dev-NNNN+gXXXXXXX), which is why we keep a full-history clone
# (no `depth:`) -- a shallow clone has no version tags for describe to find.
#
# To pull a newer nightly, force a clean rebuild so the moving tag is re-fetched
# instead of served from the source cache:
#   pixi clean && pixi install
#
# Modeled on the conda-forge `nvim` feedstock, trimmed to a native build
# (no cross-compilation handling) for a personal dotfiles setup.

context:
  version: "0.13.0.dev"

package:
  name: nvim
  version: ${{ version }}

source:
  git: https://github.com/neovim/neovim.git
  tag: nightly

build:
  number: 0

requirements:
  build:
    # `compiler("c")` pulls the real toolchain (clang on osx, gcc on linux)
    # incl. the SDK/sysroot, which is all we need for a personal build. We
    # intentionally omit `stdlib("c")` -- it only adds redistribution run-export
    # pins and would otherwise force a platform-specific variant config.
    - ${{ compiler("c") }}
    - cmake
    - make
    - ninja
    - pkg-config
    - gettext-tools
  host:
    # Neovim is built against these as system libraries (USE_BUNDLED=OFF),
    # so we don't have to compile them ourselves.
    - libtree-sitter
    - libutf8proc
    - libuv
    - lua-lpeg
    - luajit-openresty
    - luv
    - unibilium
    - if: unix
      then: libiconv
    - if: osx or win
      then: libintl-devel
  run:
    - luajit-openresty

tests:
  - script:
      - nvim --version

about:
  homepage: https://neovim.io/
  license: Apache-2.0
  license_file: LICENSE.txt
  summary: Ambitious Vim-fork focused on extensibility and agility
  repository: https://github.com/neovim/neovim
