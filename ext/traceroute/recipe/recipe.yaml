# traceroute -- Dmitry Butskoy's traceroute. Linux-only.
context:
  version: "2.1.6"

package:
  name: traceroute
  version: ${{ version }}

source:
  url: https://downloads.sourceforge.net/project/traceroute/traceroute/traceroute-${{ version }}/traceroute-${{ version }}.tar.gz
  sha256: 9ccef9cdb9d7a98ff7fbf93f79ebd0e48881664b525c4b232a0fcec7dcb9db5e

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - make

tests:
  - script:
      - command -v traceroute

about:
  homepage: https://traceroute.sourceforge.net/
  license: GPL-2.0-or-later
  summary: Trace the network path packets take to a host
