# Buildable pixi package for sshr (https://github.com/DoeringChristian/sshr),
# your own SSH wrapper. Not on any conda channel, so built from source.
# Pure-Rust binary; the repo has no tags, so we track the `main` branch HEAD
# (force a clean rebuild to pick up new commits: `pixi clean && pixi install`).

[package]
name = "sshr"
version = "0.1.0"

[package.build.backend]
name = "pixi-build-rattler-build"
version = "*"
channels = ["https://prefix.dev/conda-forge"]
