# sshr -- your SSH wrapper (Rust). Built from the main branch (no releases).
context:
  version: "0.1.0"

package:
  name: sshr
  version: ${{ version }}

source:
  git: https://github.com/DoeringChristian/sshr.git
  branch: main

build:
  number: 2   # bumped: add patchelf for Linux binary relocation

requirements:
  build:
    - ${{ compiler('c') }}   # linker driver for the rust build
    - rust                   # conda-forge `rust` bundles rustc + cargo
    # cargo doesn't inject conda's $PREFIX/lib rpath the way the C compiler does,
    # so rattler-build must patchelf the binary to relocate it -> needs patchelf
    # on the build PATH (macOS uses install_name_tool from the toolchain).
    - if: linux
      then:
        - patchelf
  run:
    - openssh                # sshr shells out to the system `ssh`

tests:
  - script:
      - sshr --help

about:
  homepage: https://github.com/DoeringChristian/sshr
  summary: SSH wrapper with kitty / shpool integration
  repository: https://github.com/DoeringChristian/sshr
