# sshr -- your SSH wrapper (Rust). Built from the main branch (no releases).
context:
  version: "0.1.0"

package:
  name: sshr
  version: ${{ version }}

source:
  git: https://github.com/DoeringChristian/sshr.git
  branch: main

build:
  number: 3   # bumped: skip binary relocation (no patchelf needed)
  # cargo doesn't inject conda's $PREFIX/lib rpath like the C compiler does, so
  # rattler-build tries to patchelf the binary to relocate it and fails when
  # patchelf isn't on the build PATH. sshr is a standalone CLI that links only
  # system glibc/libgcc and shells out to the system `ssh` (no conda libs to find
  # via rpath), so there's nothing to relocate -- just skip it.
  dynamic_linking:
    binary_relocation: false

requirements:
  build:
    - ${{ compiler('c') }}   # linker driver for the rust build
    - rust                   # conda-forge `rust` bundles rustc + cargo
  run:
    - openssh                # sshr shells out to the system `ssh`

tests:
  - script:
      - sshr --help

about:
  homepage: https://github.com/DoeringChristian/sshr
  summary: SSH wrapper with kitty / shpool integration
  repository: https://github.com/DoeringChristian/sshr
