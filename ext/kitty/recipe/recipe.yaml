# kitty -- fast, GPU-based terminal. Installed from the project's OFFICIAL
# prebuilt, self-contained binaries (the same artifacts kitty's installer.sh
# uses) instead of building from source. They bundle their own Python + libs and
# use the system's GL/X11/Wayland at runtime, so there is no build toolchain and
# none of the Linux GL/fontconfig/expat link headaches.
#
# To bump: change `version`, ext/kitty/pixi.toml, and the four sha256 below
# (download the release assets and `shasum -a 256`).

context:
  version: "0.47.4"

package:
  name: kitty
  version: ${{ version }}

source:
  # Linux: relocatable .txz bundles (bin/ lib/ share/), extracted into dist/.
  - if: target_platform == "linux-64"
    then:
      - url: https://github.com/kovidgoyal/kitty/releases/download/v${{ version }}/kitty-${{ version }}-x86_64.txz
        sha256: bc230142b2bd27f2a4bf1b1b67575f3d397a4ea2cc83f4ac2b912c306a939693
        target_directory: dist
  - if: target_platform == "linux-aarch64"
    then:
      - url: https://github.com/kovidgoyal/kitty/releases/download/v${{ version }}/kitty-${{ version }}-arm64.txz
        sha256: 998216e2662b4d2237f10e21dfec5f4e916063f1b6c17f96edae08212e91d0fa
        target_directory: dist
  # macOS: universal .dmg (contains kitty.app). Kept as a file (not extracted);
  # build.sh mounts it with hdiutil.
  - if: osx
    then:
      - url: https://github.com/kovidgoyal/kitty/releases/download/v${{ version }}/kitty-${{ version }}.dmg
        sha256: b53b9b18a27d53ad44a25dd6776fde8c47487b4e103ac50d682af1ee8e7b77ed
        file_name: kitty.dmg

build:
  number: 0
  # Prebuilt, self-contained binaries: don't let rattler-build patchelf/relocate
  # them (it would rewrite their bundled rpaths and needs patchelf on Linux).
  dynamic_linking:
    binary_relocation: false

tests:
  - script:
      - kitty --version
      - kitten --version

about:
  homepage: https://sw.kovidgoyal.net/kitty/
  license: GPL-3.0-only
  summary: Cross-platform, fast, feature-rich, GPU-based terminal
  repository: https://github.com/kovidgoyal/kitty
