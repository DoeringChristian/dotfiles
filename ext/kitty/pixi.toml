# pixi package for the kitty terminal (kovidgoyal/kitty). conda-forge only ships
# an ancient kitty (0.23.1, linux-only), so we install the project's OFFICIAL
# prebuilt, self-contained binaries (Linux .txz, macOS .dmg) -- the same
# artifacts kitty's installer.sh uses. See recipe/recipe.yaml.

[package]
name = "kitty"
version = "0.47.4"

[package.build.backend]
name = "pixi-build-rattler-build"
version = "*"
channels = ["https://prefix.dev/conda-forge"]
