# claude-code, vendored from npm via a thin rattler-build recipe (recipe/build.sh
# runs `npm install`). Standard pixi-build-rattler-build backend -> builds under
# `pixi global sync` with no backend override needed.

[package]
name = "claude-code"
version = "2.1.187"

[package.build.backend]
name = "pixi-build-rattler-build"
version = "*"
channels = ["https://prefix.dev/conda-forge"]
