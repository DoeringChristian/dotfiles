# claude-code -- Anthropic's Claude Code CLI, vendored from npm.
# No `source:` block: npm fetches the package itself during build.sh.
context:
  version: "2.1.187"

package:
  name: claude-code
  version: ${{ version }}

build:
  number: 0

requirements:
  build:
    - nodejs        # provides `npm` at build time
  run:
    - nodejs        # the `claude` launcher runs under node

tests:
  - script:
      - claude --version

about:
  homepage: https://github.com/anthropics/claude-code
  license: LicenseRef-Anthropic
  summary: Claude Code -- agentic coding tool in your terminal
