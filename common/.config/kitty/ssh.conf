# Use fish on remote with full shell integration
login_shell fish

# kitten-shpool: pass persistent SSH env vars and deploy the shpool hook
env PERSISTENT_SSH_SESSION=_kitty_copy_env_var_
env PERSISTENT_SSH_SHELL=_kitty_copy_env_var_
copy --dest .config/fish/conf.d/00-persistent-ssh.fish .config/kitty/kitten-shpool/persistent-ssh-rc.fish
