font_family FiraCode Nerd Font


include ./themes/macchiato.conf

# Shell integration is sourced and configured manually
shell_integration no-rc

# Disable warning when program wants to use clipboard
clipboard_control write-clipboard write-primary read-clipboard read-primary no-ask

allow_remote_control yes
macos_option_as_alt yes

# Clear all default shortcuts so Alt+key passes through to tmux
clear_all_shortcuts yes
listen_on unix:/tmp/kitty
exe_search_path +~/.nix-profile/bin
shell fish
startup_session startup.conf
update_check_interval 0
wayland_titlebar_color background

# Font size
map cmd+equal change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+plus change_font_size all +1.0
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+plus change_font_size all +1.0

# Clipboard
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Kill stale SSH connections after wake
map cmd+r launch --type=background kitty-ssh-bounce

# Translate Cmd+key to Alt/Meta escape sequences for tmux (macOS)
# tmux binds these as M-key; Cmd can't reach tmux directly
map cmd+h send_text all \x1bh
map cmd+j send_text all \x1bj
map cmd+k send_text all \x1bk
map cmd+l send_text all \x1bl
map cmd+w send_text all \x1bw
map cmd+n send_text all \x1bn
map cmd+p send_text all \x1bp
map cmd+x send_text all \x1bx
map cmd+m send_text all \x1bm
map cmd+enter send_text all \x1b\r
map cmd+e send_text all \x1be
map cmd+u send_text all \x1bu
map cmd+\\ send_text all \x1b\\
map cmd+- send_text all \x1b-
map cmd+t send_text all \x1bt
