# Prefix: Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Terminal & color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-kitty:Tc,xterm-256color:Tc"

# Shell
set -g default-command fish

# Reduce escape delay (critical for fish vi-mode jk binding)
set -sg escape-time 10

# Mouse
set -g mouse on

# Scrollback
set -g history-limit 50000

# Window/pane numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Focus events (for nvim autoread)
set -g focus-events on

# Vi copy-mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# -------------------------------------------------------------------
# Alt keybindings (replaces kitty's Alt+key window management)
# -------------------------------------------------------------------

# Pane navigation (preserves zoom: switches pane and re-zooms)
bind -n M-h if -F '#{window_zoomed_flag}' 'select-pane -L; resize-pane -Z' 'select-pane -L'
bind -n M-j if -F '#{window_zoomed_flag}' 'select-pane -D; resize-pane -Z' 'select-pane -D'
bind -n M-k if -F '#{window_zoomed_flag}' 'select-pane -U; resize-pane -Z' 'select-pane -U'
bind -n M-l if -F '#{window_zoomed_flag}' 'select-pane -R; resize-pane -Z' 'select-pane -R'

# Window (tab) management
bind -n M-w new-window -c "#{pane_current_path}"
bind -n M-n next-window
bind -n M-p previous-window
bind -n M-x kill-pane

# Pane zoom (toggle fullscreen)
bind -n M-m resize-pane -Z

# Cycle through tiled layouts
bind -n M-t next-layout

# Split panes
bind -n M-Enter split-window -v -c "#{pane_current_path}"
bind -n M-\\ split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"

# Scrollback
bind -n M-u copy-mode

# Scrollback to nvim (ANSI colors preserved, cursor positioned)
bind -n M-e run-shell 'POS=$((#{history_size} + #{cursor_y} + 1)); tmux capture-pane -e -S -32768 -p > /tmp/tmux-scrollback; tmux split-window -Z "nvim -u ~/.config/nvim/tsb.lua +$POS /tmp/tmux-scrollback"'

# -------------------------------------------------------------------
# Catppuccin Macchiato theme (inline, no TPM dependency)
# -------------------------------------------------------------------

# Status bar
set -g status-style "bg=#1e2030,fg=#cad3f5"
set -g status-left "#[bg=#c6a0f6,fg=#181926,bold] #S #[default] "
set -g status-left-length 30
set -g status-right "#[fg=#6e738d]%H:%M "
set -g status-right-length 20

# Window status
set -g window-status-format "#[fg=#6e738d] #I:#W "
set -g window-status-current-format "#[bg=#363a4f,fg=#c6a0f6,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#6e738d"
set -g pane-active-border-style "fg=#b7bdf8"

# Messages & command line
set -g message-style "bg=#24273a,fg=#cad3f5"

# Copy-mode highlight
set -g mode-style "bg=#f4dbd6,fg=#24273a"
