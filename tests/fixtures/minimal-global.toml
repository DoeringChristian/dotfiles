# Minimal pixi-global manifest for the fast docker smoke test (tests/run.sh).
# Channel packages only -- no ext/ source builds -- so it exercises the bootstrap
# plumbing (prereqs -> pixi -> sync -> ~/.pixi/bin -> stow) in a couple of minutes.
# The real toolset is ../../pixi-global.toml (used by `tests/run.sh --full`).
version = 1

[envs.dotfiles]
channels = ["conda-forge"]

[envs.dotfiles.dependencies]
ripgrep = "*"
fish = "*"
git = "*"
git-lfs = "*"
# stow isn't on conda-forge for all platforms (e.g. linux-aarch64), so -- like
# the real manifest -- build it from source. Path is relative to THIS file
# (tests/fixtures/), so ../../ext/stow points at the repo's recipe.
stow = { path = "../../ext/stow" }

[envs.dotfiles.exposed]
rg = "rg"
fish = "fish"
stow = "stow"
git = "git"
git-lfs = "git-lfs"
